<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECHO — time moves when you move</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #07070c;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
    user-select: none;
  }
  #wrap { position: fixed; inset: 0; display: grid; place-items: center; }
  canvas { display: block; background: #0a0a12; box-shadow: 0 0 80px rgba(80,120,255,0.15); }
  #hud {
    position: fixed; top: 14px; left: 0; right: 0;
    text-align: center; color: #8fa8ff; letter-spacing: 3px;
    font-size: 13px; pointer-events: none; text-transform: uppercase;
    text-shadow: 0 0 10px rgba(120,150,255,0.5);
  }
  #title {
    position: fixed; inset: 0; display: grid; place-items: center;
    color: #cdd8ff; text-align: center; pointer-events: none;
    transition: opacity .4s; z-index: 5;
  }
  #title h1 { font-size: 64px; margin: 0; letter-spacing: 14px; text-shadow: 0 0 30px rgba(120,150,255,0.7); }
  #title p { color: #7e8fd0; letter-spacing: 2px; line-height: 1.9; font-size: 14px; }
  .key { color: #ffd479; }
  .hidden { opacity: 0; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hud"></div>
<div id="title">
  <div>
    <h1>ECHO</h1>
    <p>
      time moves only when <em>you</em> move<br><br>
      <span class="key">WASD</span> / arrows &nbsp;—&nbsp; move (advances time)<br>
      <span class="key">MOUSE</span> &nbsp;—&nbsp; aim &nbsp;·&nbsp; <span class="key">CLICK</span> &nbsp;—&nbsp; shoot<br>
      stand still to read the battlefield<br><br>
      <span class="key">— move to begin —</span>
    </p>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const titleEl = document.getElementById('title');

let W, H;
function resize() {
  W = canvas.width = Math.min(window.innerWidth, 1100);
  H = canvas.height = Math.min(window.innerHeight, 720);
}
window.addEventListener('resize', resize);
resize();

// ---- input ----
const keys = {};
const mouse = { x: W/2, y: H/2, down: false };
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});
canvas.addEventListener('mousedown', () => { mouse.down = true; tryShoot(); });
canvas.addEventListener('mouseup',   () => { mouse.down = false; });

// ---- state ----
const rand = (a, b) => a + Math.random() * (b - a);
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

let player, bullets, enemies, particles, pickups;
let wave, score, started, gameOver, shake, flash, slowmoMsg;
let timePulse = 0;        // smoothed "how much time is flowing" 0..1
let ammo, maxAmmo;

function reset() {
  player = { x: W/2, y: H/2, r: 11, hp: 3, maxhp: 3, moving: false, recoil: 0, invuln: 0 };
  bullets = []; enemies = []; particles = []; pickups = [];
  wave = 0; score = 0; started = false; gameOver = false;
  shake = 0; flash = 0; timePulse = 0;
  ammo = 6; maxAmmo = 6;
  spawnWave();
}

function spawnWave() {
  wave++;
  const count = 2 + wave;
  for (let i = 0; i < count; i++) {
    const edge = Math.floor(rand(0, 4));
    let x, y;
    if (edge === 0) { x = rand(0, W); y = -20; }
    else if (edge === 1) { x = W + 20; y = rand(0, H); }
    else if (edge === 2) { x = rand(0, W); y = H + 20; }
    else { x = -20; y = rand(0, H); }
    const charger = Math.random() < Math.min(0.15 + wave * 0.04, 0.5);
    enemies.push({
      x, y, r: charger ? 9 : 13,
      hp: charger ? 1 : 2, maxhp: charger ? 1 : 2,
      speed: charger ? rand(1.7, 2.3) : rand(0.7, 1.1),
      charger, hue: charger ? 350 : 18, hit: 0,
    });
  }
}

// ---- mechanics ----
function tryShoot() {
  if (!started || gameOver) return;
  if (ammo <= 0) { flash = Math.max(flash, 0.12); return; }
  ammo--;
  const ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const sp = 13;
  bullets.push({
    x: player.x + Math.cos(ang) * 16,
    y: player.y + Math.sin(ang) * 16,
    vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
    life: 90, friendly: true,
  });
  player.recoil = 6;
  shake = Math.max(shake, 4);
  for (let i = 0; i < 5; i++) burst(player.x, player.y, ang, 210);
}

function burst(x, y, baseAng, hue) {
  const a = baseAng + rand(-0.5, 0.5);
  particles.push({
    x, y, vx: Math.cos(a) * rand(1, 5), vy: Math.sin(a) * rand(1, 5),
    life: rand(12, 28), max: 28, hue,
  });
}
function explode(x, y, hue, n=18) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2), s = rand(1, 6);
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: rand(14, 34), max: 34, hue });
  }
}

function damagePlayer() {
  if (player.invuln > 0) return;
  player.hp--; player.invuln = 60;
  shake = 18; flash = 0.5;
  explode(player.x, player.y, 210, 24);
  if (player.hp <= 0) { gameOver = true; explode(player.x, player.y, 210, 60); shake = 30; }
}

// ---- loop ----
function update() {
  // movement intent
  let mx = 0, my = 0;
  if (keys['a'] || keys['arrowleft'])  mx -= 1;
  if (keys['d'] || keys['arrowright']) mx += 1;
  if (keys['w'] || keys['arrowup'])    my -= 1;
  if (keys['s'] || keys['arrowdown'])  my += 1;
  const movingNow = (mx || my) && !gameOver;

  if (movingNow && !started) { started = true; titleEl.classList.add('hidden'); }

  // TIME FLOW: 1 when moving, eases toward 0 when still
  const target = movingNow ? 1 : 0;
  timePulse += (target - timePulse) * (movingNow ? 0.5 : 0.18);
  const T = timePulse; // global time multiplier

  // move player (player moves in real time, that's the input)
  if (movingNow) {
    const len = Math.hypot(mx, my) || 1;
    const ps = 3.4;
    player.x += (mx / len) * ps;
    player.y += (my / len) * ps;
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y));
  }
  player.recoil *= 0.8;
  if (player.invuln > 0) player.invuln--;

  // everything else scales by T
  // bullets
  for (const b of bullets) {
    b.x += b.vx * T; b.y += b.vy * T;
    b.life -= T;
  }
  // enemy bullets vs player handled in collision

  // enemies chase
  for (const e of enemies) {
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(a) * e.speed * T;
    e.y += Math.sin(a) * e.speed * T;
    if (e.hit > 0) e.hit -= 1;
    // contact damage
    if (dist(e, player) < e.r + player.r) damagePlayer();
  }

  // bullet vs enemy
  for (const b of bullets) {
    if (!b.friendly || b.life <= 0) continue;
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      if (dist(b, e) < e.r + 4) {
        e.hp--; b.life = 0; e.hit = 6;
        explode(b.x, b.y, e.hue, 6);
        shake = Math.max(shake, 5);
        if (e.hp <= 0) {
          score += e.charger ? 25 : 15;
          explode(e.x, e.y, e.hue, 22);
          pickups.push({ x: e.x, y: e.y, r: 6, life: 600, pulse: 0 });
        }
        break;
      }
    }
  }

  // pickups (ammo) — drift toward player slightly, collected on touch
  for (const p of pickups) {
    p.pulse += 0.1;
    p.life -= 1;
    const d = dist(p, player);
    if (d < 90) { // magnet, works in real time so you can always grab
      const a = Math.atan2(player.y - p.y, player.x - p.x);
      p.x += Math.cos(a) * 2.4; p.y += Math.sin(a) * 2.4;
    }
    if (d < player.r + p.r) {
      p.life = 0;
      ammo = Math.min(maxAmmo, ammo + 2);
      flash = Math.max(flash, 0.1);
      for (let i=0;i<8;i++) burst(player.x, player.y, rand(0,6.28), 50);
    }
  }

  // particles
  for (const pt of particles) {
    pt.x += pt.vx * Math.max(T, 0.25); // particles keep a little life even frozen, for feel
    pt.y += pt.vy * Math.max(T, 0.25);
    pt.vx *= 0.96; pt.vy *= 0.96;
    pt.life -= 1;
  }

  // cleanup
  bullets = bullets.filter(b => b.life > 0 && b.x > -40 && b.x < W+40 && b.y > -40 && b.y < H+40);
  enemies = enemies.filter(e => e.hp > 0);
  particles = particles.filter(p => p.life > 0);
  pickups = pickups.filter(p => p.life > 0);

  // next wave
  if (enemies.length === 0 && started && !gameOver) spawnWave();

  // decay fx
  shake *= 0.86;
  flash *= 0.88;
}

// ---- render ----
function draw() {
  const sx = (Math.random() - 0.5) * shake;
  const sy = (Math.random() - 0.5) * shake;
  ctx.save();
  ctx.translate(sx, sy);

  // background with desaturation based on time-stop
  const frozen = 1 - timePulse; // 1 = fully frozen
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(-20, -20, W+40, H+40);

  // frozen tint grid
  ctx.globalAlpha = 0.06 + frozen * 0.10;
  ctx.strokeStyle = frozen > 0.5 ? '#5b78ff' : '#2a3050';
  ctx.lineWidth = 1;
  const g = 40;
  ctx.beginPath();
  for (let x = 0; x < W; x += g) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (let y = 0; y < H; y += g) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();
  ctx.globalAlpha = 1;

  // "time frozen" vignette
  if (frozen > 0.4) {
    ctx.globalAlpha = (frozen - 0.4) * 0.5;
    ctx.strokeStyle = '#6f8bff';
    ctx.lineWidth = 4;
    ctx.strokeRect(6, 6, W-12, H-12);
    ctx.globalAlpha = 1;
  }

  // particles
  for (const p of particles) {
    const a = p.life / p.max;
    ctx.globalAlpha = Math.max(0, a);
    ctx.fillStyle = `hsl(${p.hue}, 90%, ${55 + a*20}%)`;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // pickups (ammo crystals)
  for (const p of pickups) {
    const s = 6 + Math.sin(p.pulse) * 1.5;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.pulse * 0.5);
    ctx.fillStyle = '#ffd479';
    ctx.shadowColor = '#ffd479'; ctx.shadowBlur = 14;
    ctx.fillRect(-s/2, -s/2, s, s);
    ctx.restore();
  }
  ctx.shadowBlur = 0;

  // enemies
  for (const e of enemies) {
    const sat = 40 + timePulse * 50;     // desaturate when frozen
    const lig = 55 + (e.hit > 0 ? 30 : 0);
    ctx.fillStyle = `hsl(${e.hue}, ${sat}%, ${lig}%)`;
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 12 * timePulse + 4;
    ctx.beginPath();
    if (e.charger) {
      // triangle pointing at player
      const a = Math.atan2(player.y - e.y, player.x - e.x);
      ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(a);
      ctx.moveTo(e.r, 0); ctx.lineTo(-e.r, -e.r*0.8); ctx.lineTo(-e.r, e.r*0.8);
      ctx.closePath(); ctx.fill(); ctx.restore();
    } else {
      ctx.arc(e.x, e.y, e.r, 0, 6.2832); ctx.fill();
    }
    // hp pip
    if (e.maxhp > 1) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(e.x - e.r, e.y - e.r - 7, (e.r*2) * (e.hp/e.maxhp), 3);
    }
  }
  ctx.shadowBlur = 0;

  // bullets with motion trail
  for (const b of bullets) {
    ctx.strokeStyle = '#bfe0ff';
    ctx.shadowColor = '#7fc8ff'; ctx.shadowBlur = 10;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - b.vx * 1.4, b.y - b.vy * 1.4);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // aim line
  if (started && !gameOver) {
    const a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = ammo > 0 ? '#7fc8ff' : '#ff6b6b';
    ctx.setLineDash([4, 8]); ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(player.x + Math.cos(a)*16, player.y + Math.sin(a)*16);
    ctx.lineTo(player.x + Math.cos(a)*600, player.y + Math.sin(a)*600);
    ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha = 1;
  }

  // player
  const blink = player.invuln > 0 && Math.floor(player.invuln / 4) % 2 === 0;
  if (!gameOver && !blink) {
    const a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    const px = player.x - Math.cos(a) * player.recoil;
    const py = player.y - Math.sin(a) * player.recoil;
    ctx.save();
    ctx.translate(px, py); ctx.rotate(a);
    ctx.fillStyle = '#dfe8ff';
    ctx.shadowColor = '#9fb8ff'; ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.moveTo(player.r, 0);
    ctx.lineTo(-player.r*0.7, -player.r*0.8);
    ctx.lineTo(-player.r*0.3, 0);
    ctx.lineTo(-player.r*0.7, player.r*0.8);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.shadowBlur = 0;
  }

  ctx.restore();

  // flash
  if (flash > 0.01) {
    ctx.fillStyle = `rgba(255,${started?255:120},${started?255:120},${flash})`;
    ctx.fillRect(0, 0, W, H);
  }

  // HUD
  let ammoStr = '';
  for (let i = 0; i < maxAmmo; i++) ammoStr += i < ammo ? '◆' : '◇';
  let hpStr = '';
  for (let i = 0; i < player.maxhp; i++) hpStr += i < player.hp ? '♥' : '·';
  hud.innerHTML = `WAVE ${wave} &nbsp;·&nbsp; SCORE ${score} &nbsp;·&nbsp; <span style="color:#ffd479">${ammoStr}</span> &nbsp;·&nbsp; <span style="color:#ff8fa8">${hpStr}</span>` +
    (timePulse < 0.15 && started ? `<br><span style="color:#6f8bff;font-size:11px">— TIME STOPPED —</span>` : '');

  // game over
  if (gameOver) {
    ctx.fillStyle = 'rgba(7,7,12,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#dfe8ff'; ctx.textAlign = 'center';
    ctx.font = '48px Courier New';
    ctx.fillText('TIME RESUMES', W/2, H/2 - 20);
    ctx.font = '18px Courier New'; ctx.fillStyle = '#7e8fd0';
    ctx.fillText(`reached wave ${wave} · score ${score}`, W/2, H/2 + 20);
    ctx.fillStyle = '#ffd479';
    ctx.fillText('press  R  to echo again', W/2, H/2 + 60);
  }
}

addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'r' && gameOver) reset();
});

function frame() {
  update();
  draw();
  requestAnimationFrame(frame);
}

reset();
frame();
</script>
</body>
</html>
